<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER HANS - Winter Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Poppins', sans-serif;
        }

        /* Animasi */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes glowPulse {
            0% { box-shadow: 0 0 5px rgba(150, 200, 255, 0.3); }
            50% { box-shadow: 0 0 25px rgba(150, 200, 255, 0.6); }
            100% { box-shadow: 0 0 5px rgba(150, 200, 255, 0.3); }
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Animasi dropdown smooth */
        @keyframes dropdownOpen {
            from { 
                opacity: 0;
                transform: translateY(-10px);
            }
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Ripple effect */
        .ripple {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0) 70%);
            transform: scale(0);
            animation: rippleAnim 0.5s ease-out;
            pointer-events: none;
            z-index: 9999;
        }

        @keyframes rippleAnim {
            to {
                transform: scale(15);
                opacity: 0;
            }
        }

        /* Background utama */
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a4a6f, #2c7ab1, #4a9fcf);
            background-size: 200% 200%;
            animation: gradientShift 10s ease infinite;
            position: relative;
            overflow-x: hidden;
        }

        /* Background awan - posisi fixed biar di semua halaman */
        .cloud {
            position: fixed;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 1000px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            z-index: 0;
            pointer-events: none;
        }

        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: inherit;
            border-radius: 50%;
        }

        .cloud1 {
            top: 10%;
            left: -150px;
            width: 180px;
            height: 100px;
            animation: floatCloud1 20s linear infinite;
        }
        .cloud1::before {
            width: 70px;
            height: 70px;
            top: -35px;
            left: 20px;
        }
        .cloud1::after {
            width: 100px;
            height: 100px;
            top: -50px;
            left: 70px;
        }

        .cloud2 {
            bottom: 15%;
            right: -150px;
            width: 200px;
            height: 110px;
            animation: floatCloud2 25s linear infinite;
        }
        .cloud2::before {
            width: 80px;
            height: 80px;
            top: -40px;
            left: 25px;
        }
        .cloud2::after {
            width: 110px;
            height: 110px;
            top: -55px;
            left: 80px;
        }

        .cloud3 {
            top: 50%;
            right: 10%;
            width: 140px;
            height: 80px;
            animation: floatCloud3 18s linear infinite;
            opacity: 0.6;
        }
        .cloud3::before {
            width: 55px;
            height: 55px;
            top: -28px;
            left: 15px;
        }
        .cloud3::after {
            width: 80px;
            height: 80px;
            top: -40px;
            left: 55px;
        }

        .cloud4 {
            top: 70%;
            left: 20%;
            width: 120px;
            height: 70px;
            animation: floatCloud4 22s linear infinite;
            opacity: 0.5;
        }
        .cloud4::before {
            width: 50px;
            height: 50px;
            top: -25px;
            left: 15px;
        }
        .cloud4::after {
            width: 70px;
            height: 70px;
            top: -35px;
            left: 50px;
        }

        @keyframes floatCloud1 {
            from { transform: translateX(0); }
            to { transform: translateX(calc(100vw + 200px)); }
        }
        @keyframes floatCloud2 {
            from { transform: translateX(0); }
            to { transform: translateX(calc(-100vw - 250px)); }
        }
        @keyframes floatCloud3 {
            from { transform: translateX(0); }
            to { transform: translateX(calc(100vw + 200px)); }
        }
        @keyframes floatCloud4 {
            from { transform: translateX(0); }
            to { transform: translateX(calc(-100vw - 200px)); }
        }

        /* Efek salju */
        .snow {
            position: fixed;
            top: -10px;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
            pointer-events: none;
            z-index: 999;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh);
                opacity: 0;
            }
        }

        /* LOGIN */
        .login-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 50, 70, 0.92);
            padding: 40px;
            border-radius: 28px;
            text-align: center;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(200, 230, 255, 0.5);
            width: 340px;
            z-index: 101;
            animation: fadeIn 0.6s ease-out, glowPulse 3s infinite;
        }

        .login-box:hover {
            transform: translate(-50%, -50%) scale(1.02);
            border-color: rgba(200, 230, 255, 0.9);
        }

        .login-box h2 {
            color: #d4f1ff;
            margin-bottom: 25px;
            font-size: 28px;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .login-box input {
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            border: none;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.95);
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .login-box input:focus {
            outline: none;
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(150, 200, 255, 0.5);
        }

        .login-box button {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            border: none;
            border-radius: 40px;
            background: linear-gradient(135deg, #2c7ab1, #4a9fcf);
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .login-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(44, 122, 177, 0.4);
        }

        .error {
            color: #ffb4a2;
            margin-top: 15px;
            font-size: 14px;
        }

        /* MAIN APP */
        .app {
            display: flex;
            min-height: 100vh;
            animation: fadeIn 0.5s ease-out;
            position: relative;
            z-index: 1;
        }

        /* SIDEBAR */
        .sidebar {
            width: 330px;
            background: rgba(15, 45, 65, 0.88);
            backdrop-filter: blur(12px);
            padding: 25px;
            color: white;
            overflow-y: auto;
            border-right: 1px solid rgba(150, 200, 255, 0.3);
            animation: slideInLeft 0.5s ease-out;
        }

        .sidebar h3 {
            color: #c5e8ff;
            margin-bottom: 25px;
            font-size: 22px;
            border-left: 3px solid #7ec8e0;
            padding-left: 12px;
        }

        .menu-item {
            margin-bottom: 8px;
        }

        .menu-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(60, 120, 150, 0.5);
            border-radius: 14px;
            padding: 12px 15px;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .menu-header:hover {
            background: #3a7ca0;
            transform: translateX(5px);
        }

        .menu-title {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            font-weight: 500;
        }

        .menu-controls {
            display: flex;
            gap: 6px;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .menu-header:hover .menu-controls {
            opacity: 1;
        }

        .menu-controls button {
            background: rgba(0,0,0,0.5);
            border: none;
            color: white;
            cursor: pointer;
            font-size: 12px;
            padding: 5px 10px;
            border-radius: 10px;
            transition: all 0.2s ease;
        }

        .menu-controls button:hover {
            background: rgba(0,0,0,0.8);
        }

        .delete-btn:hover {
            background: #c0392b !important;
        }

        /* SUBMENU - SMOOTH DROPDOWN */
        .submenu {
            margin-left: 25px;
            margin-top: 8px;
            margin-bottom: 12px;
            display: none;
        }

        .submenu.open {
            display: block;
            animation: dropdownOpen 0.3s ease-out forwards;
        }

        .submenu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(40, 90, 115, 0.6);
            border-radius: 12px;
            padding: 10px 14px;
            margin: 6px 0;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .submenu-item:hover {
            background: #4a8fb0;
            transform: translateX(5px);
        }

        .submenu-item .item-title {
            flex: 1;
            font-size: 14px;
        }

        .submenu-controls button {
            background: rgba(0,0,0,0.4);
            border: none;
            color: white;
            cursor: pointer;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 8px;
            margin-left: 6px;
            transition: all 0.2s ease;
        }

        .submenu-controls button:hover {
            background: #c0392b;
        }

        .add-submenu {
            background: rgba(60, 120, 150, 0.4);
            border: 1px dashed #7ec8e0;
            border-radius: 12px;
            padding: 8px 14px;
            margin-top: 10px;
            text-align: center;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
        }

        .add-submenu:hover {
            background: #4a8fb0;
        }

        /* CONTENT */
        .content {
            flex: 1;
            padding: 35px;
            background: rgba(0, 30, 45, 0.4);
            backdrop-filter: blur(6px);
            animation: slideInRight 0.5s ease-out;
        }

        textarea {
            width: 100%;
            padding: 18px;
            background: rgba(25, 65, 85, 0.92);
            border: 1px solid #7ec8e0;
            color: white;
            border-radius: 20px;
            font-size: 16px;
            min-height: 450px;
            resize: vertical;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #a8e0f0;
            box-shadow: 0 0 20px rgba(100, 180, 220, 0.3);
        }

        button {
            background: linear-gradient(135deg, #2c7ab1, #4a9fcf);
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            margin-top: 20px;
            margin-right: 12px;
            font-weight: 600;
            transition: all 0.25s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(44, 122, 177, 0.4);
        }

        .global-actions {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(126, 200, 224, 0.3);
        }

        .global-actions button {
            width: 100%;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #7ec8e0;
            border-radius: 10px;
        }

        @media (max-width: 768px) {
            .sidebar { width: 280px; }
            .content { padding: 20px; }
        }
    </style>
</head>
<body>

<!-- Background Awan (selalu ada) -->
<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>
<div class="cloud cloud3"></div>
<div class="cloud cloud4"></div>

<div id="loginScreen">
    <div class="login-box">
        <h2>❄️ MASTER HANS ❄️</h2>
        <input type="text" id="userId" placeholder="Username" autocomplete="off">
        <input type="password" id="userPass" placeholder="Password">
        <button onclick="doLogin()">🔓 MASUK</button>
        <div id="loginError" class="error"></div>
    </div>
</div>

<div id="mainApp" style="display: none;">
    <div class="app">
        <div class="sidebar">
            <h3>📁 MENU UTAMA</h3>
            <div id="menuContainer"></div>
            <div class="global-actions">
                <button onclick="tambahMenuBaru()">+ Tambah Menu Baru</button>
            </div>
        </div>
        <div class="content">
            <div id="contentArea">
                <textarea id="mainEditor" placeholder="Pilih menu di samping kiri..."></textarea>
            </div>
            <div>
                <button onclick="saveData()">💾 SAVE</button>
                <button onclick="undoData()">↩️ UNDO</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ==================== EFEK RIPPLE (lingkaran saat klik) ====================
    function createRipple(event) {
        const ripple = document.createElement('div');
        ripple.className = 'ripple';
        const size = Math.max(window.innerWidth, window.innerHeight) * 0.6;
        ripple.style.width = ripple.style.height = `${size}px`;
        ripple.style.left = `${event.clientX - size/2}px`;
        ripple.style.top = `${event.clientY - size/2}px`;
        document.body.appendChild(ripple);
        setTimeout(() => ripple.remove(), 500);
    }
    
    document.addEventListener('click', function(e) {
        // Jangan buat ripple di tombol kontrol biar tidak terlalu ramai
        if(!e.target.closest('.menu-controls') && !e.target.closest('.submenu-controls')) {
            createRipple(e);
        }
    });
    
    // ==================== EFEK SALJU (berlaku terus) ====================
    function createSnow() {
        const snow = document.createElement('div');
        snow.className = 'snow';
        const size = Math.random() * 6 + 2;
        snow.style.width = `${size}px`;
        snow.style.height = `${size}px`;
        snow.style.left = `${Math.random() * window.innerWidth}px`;
        snow.style.opacity = Math.random() * 0.7 + 0.3;
        snow.style.animationDuration = `${Math.random() * 5 + 2}s`;
        snow.style.animationDelay = `${Math.random() * 2}s`;
        document.body.appendChild(snow);
        setTimeout(() => snow.remove(), 7000);
    }
    
    // Salju turun setiap 100ms (banyak)
    let snowInterval = setInterval(createSnow, 100);
    
    // ==================== DATA STRUCTURE ====================
    let menus = [
        { 
            id: "notepad",
            display: "📝 Notepad", 
            type: "editor",
            content: "",
            subitems: []
        },
        { 
            id: "hotkeys", 
            display: "⚡ Hotkeys", 
            type: "text",
            content: "✨ CTRL + S = Save\n✨ CTRL + Z = Undo\n✨ Klik ↑↓ untuk pindah menu\n✨ Klik 🗑️ untuk hapus menu\n✨ Klik + untuk tambah point kecil",
            subitems: []
        },
        { 
            id: "todo", 
            display: "✅ To Do List", 
            type: "todo",
            content: "[]",
            subitems: []
        },
        { 
            id: "daftar_akun", 
            display: "📂 Daftar Akun", 
            type: "editor",
            content: "",
            subitems: [
                { id: "bank", display: "🔹 Akun Bank", content: "" },
                { id: "email", display: "🔹 Akun Email", content: "" },
                { id: "medsos", display: "🔹 Media Sosial", content: "" }
            ]
        }
    ];
    
    let currentMenu = null;
    let currentSubmenu = null;
    let historyData = [];
    
    function saveAllData() {
        localStorage.setItem("master_hans_winter_v2", JSON.stringify(menus));
    }
    
    function loadAllData() {
        let saved = localStorage.getItem("master_hans_winter_v2");
        if(saved) {
            menus = JSON.parse(saved);
        }
        menus.forEach(menu => {
            if(!menu.type) menu.type = "editor";
            if(menu.content === undefined) menu.content = "";
            if(!menu.subitems) menu.subitems = [];
            if(menu.type === "todo" && typeof menu.content !== "string") {
                menu.content = JSON.stringify(menu.content || []);
            }
        });
        renderSidebar();
    }
    
    function saveHistory() {
        historyData.push(JSON.parse(JSON.stringify(menus)));
        if(historyData.length > 20) historyData.shift();
    }
    
    function renderSidebar() {
        const container = document.getElementById("menuContainer");
        if(!container) return;
        container.innerHTML = "";
        
        menus.forEach((menu, idx) => {
            const menuDiv = document.createElement("div");
            menuDiv.className = "menu-item";
            
            const header = document.createElement("div");
            header.className = "menu-header";
            
            const titleSpan = document.createElement("div");
            titleSpan.className = "menu-title";
            titleSpan.innerHTML = menu.display;
            titleSpan.onclick = (e) => {
                e.stopPropagation();
                openMainMenu(menu, idx);
            };
            
            const controls = document.createElement("div");
            controls.className = "menu-controls";
            
            if(idx > 0) {
                const upBtn = document.createElement("button");
                upBtn.innerHTML = "↑";
                upBtn.title = "Pindah ke atas";
                upBtn.onclick = (e) => {
                    e.stopPropagation();
                    moveMenuUp(idx);
                };
                controls.appendChild(upBtn);
            }
            
            if(idx < menus.length - 1) {
                const downBtn = document.createElement("button");
                downBtn.innerHTML = "↓";
                downBtn.title = "Pindah ke bawah";
                downBtn.onclick = (e) => {
                    e.stopPropagation();
                    moveMenuDown(idx);
                };
                controls.appendChild(downBtn);
            }
            
            const delBtn = document.createElement("button");
            delBtn.innerHTML = "🗑️";
            delBtn.className = "delete-btn";
            delBtn.title = "Hapus menu";
            delBtn.onclick = (e) => {
                e.stopPropagation();
                konfirmasiHapusMenu(idx);
            };
            controls.appendChild(delBtn);
            
            header.appendChild(titleSpan);
            header.appendChild(controls);
            menuDiv.appendChild(header);
            
            const submenuDiv = document.createElement("div");
            submenuDiv.className = "submenu";
            submenuDiv.id = `submenu_${idx}`;
            
            if(menu.subitems && menu.subitems.length > 0) {
                menu.subitems.forEach((sub, subIdx) => {
                    const subItem = document.createElement("div");
                    subItem.className = "submenu-item";
                    
                    const subTitle = document.createElement("div");
                    subTitle.className = "item-title";
                    subTitle.innerHTML = sub.display;
                    subTitle.onclick = () => openSubmenu(menu, subIdx);
                    
                    const subControls = document.createElement("div");
                    subControls.className = "submenu-controls";
                    
                    const delSubBtn = document.createElement("button");
                    delSubBtn.innerHTML = "🗑️";
                    delSubBtn.onclick = (e) => {
                        e.stopPropagation();
                        if(confirm(`Hapus point "${sub.display}" dari menu ${menu.display}?`)) {
                            menu.subitems.splice(subIdx, 1);
                            saveAllData();
                            renderSidebar();
                            if(currentSubmenu === sub) {
                                currentSubmenu = null;
                                const contentDiv = document.getElementById("contentArea");
                                if(contentDiv) contentDiv.innerHTML = "<div style='color:white; text-align:center; padding:40px;'>✨ Pilih menu atau point di samping kiri ✨</div>";
                            }
                        }
                    };
                    subControls.appendChild(delSubBtn);
                    
                    subItem.appendChild(subTitle);
                    subItem.appendChild(subControls);
                    submenuDiv.appendChild(subItem);
                });
            }
            
            const addSubBtn = document.createElement("div");
            addSubBtn.className = "add-submenu";
            addSubBtn.innerHTML = "+ Tambah Point Kecil";
            addSubBtn.onclick = () => tambahSubmenu(menu);
            submenuDiv.appendChild(addSubBtn);
            
            menuDiv.appendChild(submenuDiv);
            
            header.onclick = (e) => {
                if(e.target.closest('.menu-controls')) return;
                submenuDiv.classList.toggle("open");
                localStorage.setItem(`submenu_open_${idx}`, submenuDiv.classList.contains("open"));
            };
            
            if(localStorage.getItem(`submenu_open_${idx}`) === "true") {
                submenuDiv.classList.add("open");
            }
            
            container.appendChild(menuDiv);
        });
    }
    
    function openMainMenu(menu, idx) {
        currentMenu = menu;
        currentSubmenu = null;
        
        const contentDiv = document.getElementById("contentArea");
        if(!contentDiv) return;
        
        if(menu.type === "editor") {
            contentDiv.innerHTML = `<textarea id="mainEditor" placeholder="✏️ Tulis catatan untuk ${menu.display}...">${menu.content || ""}</textarea>`;
        } else if(menu.type === "text") {
            contentDiv.innerHTML = `<div style="color:white; font-size:17px; white-space:pre-wrap; line-height:1.8;">${menu.content || ""}</div>`;
        } else if(menu.type === "todo") {
            renderTodo(menu);
        } else {
            contentDiv.innerHTML = `<textarea id="mainEditor" placeholder="✏️ Isi untuk ${menu.display}">${menu.content || ""}</textarea>`;
        }
    }
    
    function openSubmenu(menu, subIdx) {
        currentMenu = menu;
        currentSubmenu = menu.subitems[subIdx];
        
        const contentDiv = document.getElementById("contentArea");
        if(!contentDiv) return;
        contentDiv.innerHTML = `<textarea id="subEditor" placeholder="📝 Tulis catatan untuk ${currentSubmenu.display}...">${currentSubmenu.content || ""}</textarea>`;
    }
    
    function renderTodo(menu) {
        let todoList = [];
        try { todoList = JSON.parse(menu.content || "[]"); } catch(e) { todoList = []; }
        let html = `<div>
            <input type="text" id="newTodo" placeholder="📝 Tugas baru..." style="width:70%; padding:12px; border-radius:40px; border:none;">
            <button onclick="addTodoItem()" style="margin-left:10px;">➕ Tambah</button>
            <ul id="todoItems" style="margin-top:25px;">`;
        todoList.forEach((item, idx) => {
            html += `<li style="color:white; margin:12px 0; padding:8px; background:rgba(255,255,255,0.1); border-radius:12px; display:flex; justify-content:space-between;">
                        <span>📌 ${item}</span>
                        <button onclick="deleteTodoItem(${idx})" style="margin:0; padding:6px 12px;">❌ Hapus</button>
                    </li>`;
        });
        html += `</ul></div>`;
        document.getElementById("contentArea").innerHTML = html;
    }
    
    function addTodoItem() {
        let input = document.getElementById("newTodo");
        if(input && input.value.trim()) {
            let menu = menus.find(m => m.type === "todo");
            if(menu) {
                let todoList = JSON.parse(menu.content || "[]");
                todoList.push(input.value.trim());
                menu.content = JSON.stringify(todoList);
                saveAllData();
                openMainMenu(menu);
            }
        }
    }
    
    function deleteTodoItem(idx) {
        let menu = menus.find(m => m.type === "todo");
        if(menu) {
            let todoList = JSON.parse(menu.content || "[]");
            todoList.splice(idx, 1);
            menu.content = JSON.stringify(todoList);
            saveAllData();
            openMainMenu(menu);
        }
    }
    
    function tambahSubmenu(menu) {
        let nama = prompt(`Tambah point kecil di menu "${menu.display}":`, "🔹 Point Baru");
        if(nama && nama.trim()) {
            if(!menu.subitems) menu.subitems = [];
            menu.subitems.push({
                id: "sub_" + Date.now() + Math.random(),
                display: nama.trim(),
                content: ""
            });
            saveAllData();
            renderSidebar();
            showToast(`✅ Point "${nama.trim()}" ditambahkan ke ${menu.display}`);
        }
    }
    
    function moveMenuUp(idx) {
        if(idx > 0) {
            [menus[idx-1], menus[idx]] = [menus[idx], menus[idx-1]];
            saveAllData();
            renderSidebar();
        }
    }
    
    function moveMenuDown(idx) {
        if(idx < menus.length - 1) {
            [menus[idx], menus[idx+1]] = [menus[idx+1], menus[idx]];
            saveAllData();
            renderSidebar();
        }
    }
    
    function konfirmasiHapusMenu(idx) {
        let menuNama = menus[idx].display;
        let konfirmasi = confirm(`⚠️ Yakin ingin menghapus menu "${menuNama}"?\n\nSEMUA point kecil di dalamnya juga akan hilang!`);
        if(konfirmasi) {
            menus.splice(idx, 1);
            saveAllData();
            renderSidebar();
            if(currentMenu === menus[idx]) {
                const contentDiv = document.getElementById("contentArea");
                if(contentDiv) contentDiv.innerHTML = "<div style='color:white; text-align:center; padding:40px;'>🗑️ Menu telah dihapus</div>";
                currentMenu = null;
            }
        }
    }
    
    function tambahMenuBaru() {
        let nama = prompt("Nama menu baru:", "Menu Baru");
        if(nama && nama.trim()) {
            menus.push({
                id: "menu_" + Date.now(),
                display: nama.trim(),
                type: "editor",
                content: "",
                subitems: []
            });
            saveAllData();
            renderSidebar();
        }
    }
    
    function saveData() {
        if(currentSubmenu && currentMenu) {
            let editor = document.getElementById("subEditor");
            if(editor) currentSubmenu.content = editor.value;
        } else if(currentMenu) {
            let editor = document.getElementById("mainEditor");
            if(editor && currentMenu.type !== "todo" && currentMenu.type !== "text") {
                currentMenu.content = editor.value;
            }
        }
        saveAllData();
        saveHistory();
        showToast("✅ Data tersimpan!");
    }
    
    function undoData() {
        if(historyData.length === 0) {
            showToast("⚠️ Tidak ada data untuk undo");
            return;
        }
        let last = historyData.pop();
        menus = last;
        saveAllData();
        renderSidebar();
        showToast("↩️ Undo berhasil");
    }
    
    function showToast(msg) {
        let toast = document.createElement("div");
        toast.innerText = msg;
        toast.style.position = "fixed";
        toast.style.bottom = "30px";
        toast.style.right = "30px";
        toast.style.background = "#2c7ab1";
        toast.style.color = "white";
        toast.style.padding = "12px 24px";
        toast.style.borderRadius = "40px";
        toast.style.zIndex = "999";
        toast.style.animation = "fadeIn 0.3s ease-out";
        toast.style.backdropFilter = "blur(10px)";
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    
    // ==================== LOGIN (TANPA PETUNJUK ID/PASSWORD) ====================
    function doLogin() {
        let id = document.getElementById("userId").value.trim();
        let pass = document.getElementById("userPass").value.trim();
        
        if(id === "admin" && pass === "101010") {
            document.getElementById("loginScreen").style.display = "none";
            document.getElementById("mainApp").style.display = "block";
            loadAllData();
            saveHistory();
            showToast("❄️ Selamat datang, Master Hans! ❄️");
        } else {
            // Hanya bilang salah, tanpa petunjuk ID/password
            document.getElementById("loginError").innerHTML = "❌ Username atau Password salah!";
        }
    }
    
    document.addEventListener("keydown", function(e) {
        const mainApp = document.getElementById("mainApp");
        if(mainApp && mainApp.style.display === "block") {
            if(e.ctrlKey && e.key === 's') {
                e.preventDefault();
                saveData();
            }
            if(e.ctrlKey && e.key === 'z') {
                e.preventDefault();
                undoData();
            }
        }
    });
    
    const passInput = document.getElementById("userPass");
    if(passInput) {
        passInput.addEventListener("keypress", function(e) {
            if(e.key === "Enter") doLogin();
        });
    }
</script>
</body>
</html>
