<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER HANS - Winter Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Background Awan (selalu ada) -->
<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>
<div class="cloud cloud3"></div>
<div class="cloud cloud4"></div>

<div id="loginScreen">
    <div class="login-box">
        <h2>❄️ MASTER HANS ❄️</h2>
        <input type="text" id="userId" placeholder="Username" autocomplete="off">
        <input type="password" id="userPass" placeholder="Password">
        <button onclick="doLogin()">🔓 MASUK</button>
        <div id="loginError" class="error"></div>
    </div>
</div>

<div id="mainApp" style="display: none;">
    <div class="app">
        <div class="sidebar">
            <h3>📁 MENU UTAMA</h3>
            <div id="menuContainer"></div>
            <div class="global-actions">
                <button onclick="tambahMenuBaru()">+ Tambah Menu Baru</button>
            </div>
        </div>
        <div class="content">
            <div id="contentArea">
                <textarea id="mainEditor" placeholder="Pilih menu di samping kiri..."></textarea>
            </div>
            <div>
                <button onclick="saveData()">💾 SAVE</button>
                <button onclick="undoData()">↩️ UNDO</button>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
