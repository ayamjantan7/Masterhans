<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Tosca Premium - Multi Submenu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Poppins', sans-serif;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes glowPulse {
            0% { box-shadow: 0 0 5px rgba(77, 208, 193, 0.3); }
            50% { box-shadow: 0 0 25px rgba(77, 208, 193, 0.7); }
            100% { box-shadow: 0 0 5px rgba(77, 208, 193, 0.3); }
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0b3b3f, #1b7e7a, #0b3b3f);
            background-size: 200% 200%;
            animation: gradientShift 8s ease infinite;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(77, 208, 193, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backdrop-filter: blur(6px);
            background: rgba(0, 30, 35, 0.4);
            z-index: -1;
        }

        /* LOGIN */
        .login-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 50, 55, 0.95);
            padding: 40px;
            border-radius: 28px;
            text-align: center;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(77, 208, 193, 0.5);
            width: 340px;
            z-index: 100;
            animation: fadeIn 0.6s ease-out, glowPulse 3s infinite;
        }

        .login-box:hover {
            transform: translate(-50%, -50%) scale(1.02);
            border-color: rgba(77, 208, 193, 0.9);
        }

        .login-box h2 {
            color: #b2f0e8;
            margin-bottom: 25px;
            font-size: 28px;
        }

        .login-box input {
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            border: none;
            border-radius: 40px;
            background: rgba(224, 247, 245, 0.95);
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .login-box input:focus {
            outline: none;
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(77, 208, 193, 0.5);
        }

        .login-box button {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            border: none;
            border-radius: 40px;
            background: linear-gradient(135deg, #1f8a82, #2ba197);
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .login-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(31, 138, 130, 0.4);
        }

        .error {
            color: #ffb4a2;
            margin-top: 15px;
            font-size: 14px;
        }

        /* MAIN APP */
        .app {
            display: flex;
            min-height: 100vh;
            animation: fadeIn 0.5s ease-out;
        }

        /* SIDEBAR */
        .sidebar {
            width: 330px;
            background: rgba(10, 45, 50, 0.92);
            backdrop-filter: blur(12px);
            padding: 25px;
            color: white;
            overflow-y: auto;
            border-right: 1px solid rgba(77, 208, 193, 0.3);
            animation: slideInLeft 0.5s ease-out;
        }

        .sidebar h3 {
            color: #9cece2;
            margin-bottom: 25px;
            font-size: 22px;
            border-left: 3px solid #4dc7bc;
            padding-left: 12px;
        }

        .menu-item {
            margin-bottom: 8px;
        }

        .menu-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(30, 100, 95, 0.5);
            border-radius: 14px;
            padding: 12px 15px;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .menu-header:hover {
            background: #2a9d8f;
            transform: translateX(5px);
        }

        .menu-title {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            font-weight: 500;
        }

        .menu-controls {
            display: flex;
            gap: 6px;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .menu-header:hover .menu-controls {
            opacity: 1;
        }

        .menu-controls button {
            background: rgba(0,0,0,0.5);
            border: none;
            color: white;
            cursor: pointer;
            font-size: 12px;
            padding: 5px 10px;
            border-radius: 10px;
            transition: all 0.2s ease;
        }

        .menu-controls button:hover {
            background: rgba(0,0,0,0.8);
        }

        .delete-btn:hover {
            background: #c0392b !important;
        }

        /* SUBMENU (point kecil untuk SEMUA menu) */
        .submenu {
            margin-left: 25px;
            margin-top: 8px;
            margin-bottom: 12px;
            display: none;
            animation: fadeIn 0.3s ease-out;
        }

        .submenu.open {
            display: block;
        }

        .submenu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(20, 70, 65, 0.6);
            border-radius: 12px;
            padding: 10px 14px;
            margin: 6px 0;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .submenu-item:hover {
            background: #2a9d8f;
            transform: translateX(5px);
        }

        .submenu-item .item-title {
            flex: 1;
            font-size: 14px;
        }

        .submenu-controls button {
            background: rgba(0,0,0,0.4);
            border: none;
            color: white;
            cursor: pointer;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 8px;
            margin-left: 6px;
        }

        .submenu-controls button:hover {
            background: #c0392b;
        }

        .add-submenu {
            background: rgba(30, 100, 95, 0.4);
            border: 1px dashed #4dc7bc;
            border-radius: 12px;
            padding: 8px 14px;
            margin-top: 10px;
            text-align: center;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
        }

        .add-submenu:hover {
            background: #2a9d8f;
        }

        /* CONTENT */
        .content {
            flex: 1;
            padding: 35px;
            background: rgba(0, 30, 35, 0.4);
            backdrop-filter: blur(6px);
            animation: slideInRight 0.5s ease-out;
        }

        textarea {
            width: 100%;
            padding: 18px;
            background: rgba(31, 62, 59, 0.95);
            border: 1px solid #4dc7bc;
            color: white;
            border-radius: 20px;
            font-size: 16px;
            min-height: 450px;
            resize: vertical;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #7ae9df;
            box-shadow: 0 0 20px rgba(77, 208, 193, 0.3);
        }

        button {
            background: linear-gradient(135deg, #1f8a82, #2ba197);
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            margin-top: 20px;
            margin-right: 12px;
            font-weight: 600;
            transition: all 0.25s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(31, 138, 130, 0.4);
        }

        .global-actions {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(77, 208, 193, 0.3);
        }

        .global-actions button {
            width: 100%;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #4dc7bc;
            border-radius: 10px;
        }

        @media (max-width: 768px) {
            .sidebar { width: 280px; }
            .content { padding: 20px; }
        }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-box">
        <h2>✨ MASTER HANS ✨</h2>
        <input type="text" id="userId" placeholder="ID">
        <input type="password" id="userPass" placeholder="Password">
        <button onclick="doLogin()">🔓 MASUK</button>
        <div id="loginError" class="error"></div>
    </div>
</div>

<div id="mainApp" style="display: none;">
    <div class="app">
        <div class="sidebar">
            <h3>📁 MENU UTAMA</h3>
            <div id="menuContainer"></div>
            <div class="global-actions">
                <button onclick="tambahMenuBaru()">+ Tambah Menu Baru</button>
            </div>
        </div>
        <div class="content">
            <div id="contentArea">
                <textarea id="mainEditor" placeholder="Pilih menu di samping kiri..."></textarea>
            </div>
            <div>
                <button onclick="saveData()">💾 Save</button>
                <button onclick="undoData()">↩️ Undo</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ==================== DATA STRUCTURE ====================
    // Setiap menu bisa memiliki subitems (point-point kecil)
    let menus = [
        { 
            id: "notepad",
            display: "📝 Notepad", 
            type: "editor",
            content: "",
            subitems: []  // point-point kecil di dalam Notepad
        },
        { 
            id: "hotkeys", 
            display: "⚡ Hotkeys", 
            type: "text",
            content: "✨ CTRL + S = Save\n✨ CTRL + Z = Undo\n✨ Klik ↑↓ untuk pindah menu\n✨ Klik 🗑️ untuk hapus menu\n✨ Klik + untuk tambah point kecil",
            subitems: []
        },
        { 
            id: "todo", 
            display: "✅ To Do List", 
            type: "todo",
            content: "[]",
            subitems: []
        },
        { 
            id: "daftar_akun", 
            display: "📂 Daftar Akun", 
            type: "submenu_parent",
            content: "",
            subitems: [
                { id: "bank", display: "🔹 Akun Bank", content: "" },
                { id: "email", display: "🔹 Akun Email", content: "" },
                { id: "medsos", display: "🔹 Media Sosial", content: "" }
            ]
        }
    ];
    
    let currentMenu = null;
    let currentSubmenu = null;  // point kecil yang sedang aktif
    let historyData = [];
    
    // ==================== SAVE & LOAD ====================
    function saveAllData() {
        localStorage.setItem("multi_submenu_v1", JSON.stringify(menus));
    }
    
    function loadAllData() {
        let saved = localStorage.getItem("multi_submenu_v1");
        if(saved) {
            menus = JSON.parse(saved);
        }
        // Pastikan setiap menu punya subitems
        menus.forEach(menu => {
            if(!menu.type) menu.type = "editor";
            if(!menu.content) menu.content = "";
            if(!menu.subitems) menu.subitems = [];
            if(menu.type === "todo" && typeof menu.content !== "string") {
                menu.content = JSON.stringify(menu.content || []);
            }
        });
        renderSidebar();
    }
    
    function saveHistory() {
        historyData.push(JSON.parse(JSON.stringify(menus)));
        if(historyData.length > 20) historyData.shift();
    }
    
    // ==================== RENDER SIDEBAR ====================
    function renderSidebar() {
        const container = document.getElementById("menuContainer");
        container.innerHTML = "";
        
        menus.forEach((menu, idx) => {
            const menuDiv = document.createElement("div");
            menuDiv.className = "menu-item";
            
            // Header menu utama
            const header = document.createElement("div");
            header.className = "menu-header";
            
            const titleSpan = document.createElement("div");
            titleSpan.className = "menu-title";
            titleSpan.innerHTML = menu.display;
            titleSpan.onclick = (e) => {
                e.stopPropagation();
                openMainMenu(menu, idx);
            };
            
            const controls = document.createElement("div");
            controls.className = "menu-controls";
            
            if(idx > 0) {
                const upBtn = document.createElement("button");
                upBtn.innerHTML = "↑";
                upBtn.title = "Pindah ke atas";
                upBtn.onclick = (e) => {
                    e.stopPropagation();
                    moveMenuUp(idx);
                };
                controls.appendChild(upBtn);
            }
            
            if(idx < menus.length - 1) {
                const downBtn = document.createElement("button");
                downBtn.innerHTML = "↓";
                downBtn.title = "Pindah ke bawah";
                downBtn.onclick = (e) => {
                    e.stopPropagation();
                    moveMenuDown(idx);
                };
                controls.appendChild(downBtn);
            }
            
            const delBtn = document.createElement("button");
            delBtn.innerHTML = "🗑️";
            delBtn.className = "delete-btn";
            delBtn.title = "Hapus menu";
            delBtn.onclick = (e) => {
                e.stopPropagation();
                konfirmasiHapusMenu(idx);
            };
            controls.appendChild(delBtn);
            
            header.appendChild(titleSpan);
            header.appendChild(controls);
            menuDiv.appendChild(header);
            
            // SUBMENU (point-point kecil) untuk SEMUA menu
            const submenuDiv = document.createElement("div");
            submenuDiv.className = "submenu";
            submenuDiv.id = `submenu_${idx}`;
            
            // Render subitems (point kecil) jika ada
            if(menu.subitems && menu.subitems.length > 0) {
                menu.subitems.forEach((sub, subIdx) => {
                    const subItem = document.createElement("div");
                    subItem.className = "submenu-item";
                    
                    const subTitle = document.createElement("div");
                    subTitle.className = "item-title";
                    subTitle.innerHTML = sub.display;
                    subTitle.onclick = () => openSubmenu(menu, subIdx);
                    
                    const subControls = document.createElement("div");
                    subControls.className = "submenu-controls";
                    
                    const delSubBtn = document.createElement("button");
                    delSubBtn.innerHTML = "🗑️";
                                    delSubBtn.onclick = (e) => {
                        e.stopPropagation();
                        if(confirm(`Hapus point "${sub.display}" dari menu ${menu.display}?`)) {
                            menu.subitems.splice(subIdx, 1);
                            saveAllData();
                            renderSidebar();
                            if(currentSubmenu === sub) {
                                currentSubmenu = null;
                                document.getElementById("contentArea").innerHTML = "<div style='color:white; text-align:center; padding:40px;'>✨ Pilih menu atau point di samping kiri ✨</div>";
                            }
                        }
                    };
                    subControls.appendChild(delSubBtn);
                    
                    subItem.appendChild(subTitle);
                    subItem.appendChild(subControls);
                    submenuDiv.appendChild(subItem);
                });
            }
            
            // Tombol tambah point kecil untuk menu ini
            const addSubBtn = document.createElement("div");
            addSubBtn.className = "add-submenu";
            addSubBtn.innerHTML = "+ Tambah Point Kecil";
            addSubBtn.onclick = () => tambahSubmenu(menu);
            submenuDiv.appendChild(addSubBtn);
            
            menuDiv.appendChild(submenuDiv);
            
            // Event toggle submenu saat klik header
            header.onclick = (e) => {
                if(e.target.closest('.menu-controls')) return;
                submenuDiv.classList.toggle("open");
                localStorage.setItem(`submenu_open_${idx}`, submenuDiv.classList.contains("open"));
            };
            
            if(localStorage.getItem(`submenu_open_${idx}`) === "true") {
                submenuDiv.classList.add("open");
            }
            
            container.appendChild(menuDiv);
        });
    }
    
    // ==================== BUKA MENU UTAMA ====================
    function openMainMenu(menu, idx) {
        currentMenu = menu;
        currentSubmenu = null;
        
        const contentDiv = document.getElementById("contentArea");
        
        if(menu.type === "editor") {
            contentDiv.innerHTML = `<textarea id="mainEditor" placeholder="✏️ Tulis catatan untuk ${menu.display}...">${menu.content || ""}</textarea>`;
        } else if(menu.type === "text") {
            contentDiv.innerHTML = `<div style="color:white; font-size:17px; white-space:pre-wrap; line-height:1.8;">${menu.content || ""}</div>`;
        } else if(menu.type === "todo") {
            renderTodo(menu);
        } else {
            contentDiv.innerHTML = `<textarea id="mainEditor" placeholder="✏️ Isi untuk ${menu.display}">${menu.content || ""}</textarea>`;
        }
    }
    
    // ==================== BUKA POINT KECIL (SUBMENU) ====================
    function openSubmenu(menu, subIdx) {
        currentMenu = menu;
        currentSubmenu = menu.subitems[subIdx];
        
        const contentDiv = document.getElementById("contentArea");
        contentDiv.innerHTML = `<textarea id="subEditor" placeholder="📝 Tulis catatan untuk ${currentSubmenu.display}...">${currentSubmenu.content || ""}</textarea>`;
    }
    
    // ==================== RENDER TO DO LIST ====================
    function renderTodo(menu) {
        let todoList = [];
        try { todoList = JSON.parse(menu.content || "[]"); } catch(e) { todoList = []; }
        let html = `<div>
            <input type="text" id="newTodo" placeholder="📝 Tugas baru..." style="width:70%; padding:12px; border-radius:40px; border:none;">
            <button onclick="addTodoItem()" style="margin-left:10px;">➕ Tambah</button>
            <ul id="todoItems" style="margin-top:25px;">`;
        todoList.forEach((item, idx) => {
            html += `<li style="color:white; margin:12px 0; padding:8px; background:rgba(255,255,255,0.1); border-radius:12px; display:flex; justify-content:space-between;">
                        <span>📌 ${item}</span>
                        <button onclick="deleteTodoItem(${idx})" style="margin:0; padding:6px 12px;">❌ Hapus</button>
                    </li>`;
        });
        html += `</ul></div>`;
        document.getElementById("contentArea").innerHTML = html;
    }
    
    function addTodoItem() {
        let input = document.getElementById("newTodo");
        if(input && input.value.trim()) {
            let menu = menus.find(m => m.type === "todo");
            if(menu) {
                let todoList = JSON.parse(menu.content || "[]");
                todoList.push(input.value.trim());
                menu.content = JSON.stringify(todoList);
                saveAllData();
                openMainMenu(menu);
            }
        }
    }
    
    function deleteTodoItem(idx) {
        let menu = menus.find(m => m.type === "todo");
        if(menu) {
            let todoList = JSON.parse(menu.content || "[]");
            todoList.splice(idx, 1);
            menu.content = JSON.stringify(todoList);
            saveAllData();
            openMainMenu(menu);
        }
    }
    
    // ==================== TAMBAH POINT KECIL (untuk SEMUA menu) ====================
    function tambahSubmenu(menu) {
        let nama = prompt(`Tambah point kecil di menu "${menu.display}":`, "🔹 Point Baru");
        if(nama && nama.trim()) {
            if(!menu.subitems) menu.subitems = [];
            menu.subitems.push({
                id: "sub_" + Date.now() + Math.random(),
                display: nama.trim(),
                content: ""
            });
            saveAllData();
            renderSidebar();
            showToast(`✅ Point "${nama.trim()}" ditambahkan ke ${menu.display}`);
        }
    }
    
    // ==================== FUNGSI MOVE & DELETE MENU ====================
    function moveMenuUp(idx) {
        if(idx > 0) {
            [menus[idx-1], menus[idx]] = [menus[idx], menus[idx-1]];
            saveAllData();
            renderSidebar();
        }
    }
    
    function moveMenuDown(idx) {
        if(idx < menus.length - 1) {
            [menus[idx], menus[idx+1]] = [menus[idx+1], menus[idx]];
            saveAllData();
            renderSidebar();
        }
    }
    
    function konfirmasiHapusMenu(idx) {
        let menuNama = menus[idx].display;
        let konfirmasi = confirm(`⚠️ Yakin ingin menghapus menu "${menuNama}"?\n\nSEMUA point kecil di dalamnya juga akan hilang!`);
        if(konfirmasi) {
            menus.splice(idx, 1);
            saveAllData();
            renderSidebar();
            if(currentMenu === menus[idx]) {
                document.getElementById("contentArea").innerHTML = "<div style='color:white; text-align:center; padding:40px;'>🗑️ Menu telah dihapus</div>";
                currentMenu = null;
            }
        }
    }
    
    function tambahMenuBaru() {
        let nama = prompt("Nama menu baru:", "Menu Baru");
        if(nama && nama.trim()) {
            menus.push({
                id: "menu_" + Date.now(),
                display: nama.trim(),
                type: "editor",
                content: "",
                subitems: []
            });
            saveAllData();
            renderSidebar();
        }
    }
    
    // ==================== SAVE & UNDO ====================
    function saveData() {
        if(currentSubmenu && currentMenu) {
            let editor = document.getElementById("subEditor");
            if(editor) currentSubmenu.content = editor.value;
        } else if(currentMenu) {
            let editor = document.getElementById("mainEditor");
            if(editor && currentMenu.type !== "todo" && currentMenu.type !== "text") {
                currentMenu.content = editor.value;
            }
        }
        saveAllData();
        saveHistory();
        showToast("✅ Data tersimpan!");
    }
    
    function undoData() {
        if(historyData.length === 0) {
            showToast("⚠️ Tidak ada data untuk undo");
            return;
        }
        let last = historyData.pop();
        menus = last;
        saveAllData();
        renderSidebar();
        showToast("↩️ Undo berhasil");
    }
    
    function showToast(msg) {
        let toast = document.createElement("div");
        toast.innerText = msg;
        toast.style.position = "fixed";
        toast.style.bottom = "30px";
        toast.style.right = "30px";
        toast.style.background = "#1f8a82";
        toast.style.color = "white";
        toast.style.padding = "12px 24px";
        toast.style.borderRadius = "40px";
        toast.style.zIndex = "999";
        toast.style.animation = "fadeIn 0.3s ease-out";
        toast.style.backdropFilter = "blur(10px)";
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    
    // ==================== LOGIN ====================
function doLogin() {
    let id = document.getElementById("userId").value.trim();
    let pass = document.getElementById("userPass").value.trim();
    
    console.log("ID masuk:", id);
    console.log("Password masuk:", pass);
    
    if(id === "admin" && pass === "101010") {
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("mainApp").style.display = "block";
        loadAllData();
        saveHistory();
        showToast("✨ Selamat datang! ✨");
    } else {
        document.getElementById("loginError").innerHTML = "❌ Login gagal!<br>ID: admin | Password: 1234";
    }
}
    // Keyboard shortcuts
    document.addEventListener("keydown", function(e) {
        if(document.getElementById("mainApp").style.display === "block") {
            if(e.ctrlKey && e.key === 's') {
                e.preventDefault();
                saveData();
            }
            if(e.ctrlKey && e.key === 'z') {
                e.preventDefault();
                undoData();
            }
        }
    });
    
    document.getElementById("userPass")?.addEventListener("keypress", function(e) {
        if(e.key === "Enter") doLogin();
    });
</script>
</body>
